<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Kaya Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 40px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            animation: fadeIn 0.4s ease-in;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #2c3e50;
        }
       h2 {
    color: #000;
}
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 18px;
            border-radius: 6px;
            background-color: #eee;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .tab-btn.active {
            background-color: #1a5c3a;
            color: white;
        }
        footer {
            margin-top: 30px;
            color: #888;
            font-size: 14px;
        }
        body.dark-mode {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        body.dark-mode .container {
            background-color: #2c2c2c;
            color: #f0f0f0;
        }
        @media (max-width: 600px) {
            body { padding: 15px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
   <button onclick="window.location.href='index.html'" style="position:fixed; top:20px; left:20px; width:44px; height:44px; border-radius:50%; border:1px solid #ccc; background-color:white; font-size:20px; cursor:pointer; z-index:100;">←</button>

 <button id="modeToggle" onclick="toggleDarkMode()" style="position:fixed; top:20px; right:20px; width:44px; height:44px; border-radius:50%; border:1px solid #ccc; background-color:white; font-size:20px; cursor:pointer; z-index:100;">☀️</button>

    <div class="container">
        <h1><span style="color:#1a5c3a;">Kaya</span><span style="color:#e67e22;">Mart</span></h1>

       
        <h2>Contact Me</h2>
        <div style="display:flex; flex-direction:column; gap:12px; max-width:300px; margin:0 auto;">
            <a href="https://wa.me/233535263510" target="_blank" style="background-color:#25D366; color:white; padding:12px; border-radius:8px; text-decoration:none; font-weight:bold;">💬 Chat on WhatsApp</a>
            <a href="tel:+233535263510" style="background-color:#1a5c3a; color:white; padding:12px; border-radius:8px; text-decoration:none; font-weight:bold;">📞 Call Me</a>
            <a href="mailto:mr.banson1@gmail.com" style="background-color:#e67e22; color:white; padding:12px; border-radius:8px; text-decoration:none; font-weight:bold;">✉️ Send Email</a>
        </div>

        <footer>
            &copy; 2026 Banson. Built with HTML &amp; CSS.
        </footer>
    </div>

    <script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
        const btn = document.getElementById("modeToggle");
        if (document.body.classList.contains("dark-mode")) {
            btn.innerHTML = "🌙";
        } else {
            btn.innerHTML = "☀️";
        }
    }
    </script>
</body>
</html>
