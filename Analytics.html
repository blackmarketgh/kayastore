function loadOwnerDashboard(content) {
    const header = document.getElementById('dashboardHeader');
    if (header) header.style.display = '';
    content.innerHTML = '<p style="text-align:center; color:#999;">Loading...</p>';

    db.collection('sales').get().then((snapshot) => {
        const sales = [];
        snapshot.forEach(doc => sales.push(doc.data()));
        renderOwnerDashboard(sales, content);
    }).catch((err) => {
        content.innerHTML = '<p style="color:red; text-align:center;">Error: ' + err.message + '</p>';
    });
}

function renderOwnerDashboard(sales, content) {
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startOfWeek = new Date(startOfDay);
    startOfWeek.setDate(startOfDay.getDate() - startOfDay.getDay());
    const startOfYear = new Date(now.getFullYear(), 0, 1);

    let daily = 0, weekly = 0, yearly = 0, allTime = 0;
    let dailyCommission = 0, weeklyCommission = 0, yearlyCommission = 0, allTimeCommission = 0;

    sales.forEach(sale => {
        const soldDate = sale.soldAt ? sale.soldAt.toDate() : new Date();
        allTime += sale.price;
        allTimeCommission += sale.commission;
        if (soldDate >= startOfYear) { yearly += sale.price; yearlyCommission += sale.commission; }
        if (soldDate >= startOfWeek) { weekly += sale.price; weeklyCommission += sale.commission; }
        if (soldDate >= startOfDay) { daily += sale.price; dailyCommission += sale.commission; }
    });

    const maxVal = Math.max(dailyCommission, weeklyCommission, yearlyCommission, allTimeCommission, 1);
    const dailyH = (dailyCommission / maxVal) * 100;
    const weeklyH = (weeklyCommission / maxVal) * 100;
    const yearlyH = (yearlyCommission / maxVal) * 100;

let allSalesData = [];
let allSellersData = [];
let allChatsData = [];
let activityDataLoaded = false;

function switchOwnerTab(tab) {
    const overviewBtn = document.getElementById('tabOverviewBtn');
    const activityBtn = document.getElementById('tabActivityBtn');
    const approvalsBtn = document.getElementById('tabApprovalsBtn');
    const overviewContent = document.getElementById('overviewTabContent');
    const activityContent = document.getElementById('activityTabContent');
    const approvalsContent = document.getElementById('approvalsTabContent');

    overviewBtn.classList.remove('active');
    activityBtn.classList.remove('active');
    approvalsBtn.classList.remove('active');
    overviewContent.style.display = 'none';
    activityContent.style.display = 'none';
    approvalsContent.style.display = 'none';

    if (tab === 'overview') {
        overviewBtn.classList.add('active');
        overviewContent.style.display = '';
    } else if (tab === 'activity') {
        activityBtn.classList.add('active');
        activityContent.style.display = '';
        if (!activityDataLoaded) {
            activityDataLoaded = true;
            loadActivityData();
        }
    } else if (tab === 'approvals') {
        approvalsBtn.classList.add('active');
        approvalsContent.style.display = '';
        loadApprovalsData();
    }
}
function loadActivityData() {
    db.collection('items').get().then(snap => {
        window.laActiveItemCount = snap.size;
        renderActivityStats();
    });

    db.collection('sellers').where('status', '==', 'approved').get().then(snap => {
        window.laActiveSellerCount = snap.size;
        renderActivityStats();
    });

    db.collection('sales').orderBy('soldAt', 'desc').get().then(snap => {
        allSalesData = snap.docs.map(doc => {
            const d = doc.data();
            return {
                icon: '💰',
                text: `Sale: ${d.title} - GHS ${d.price} (commission GHS ${d.commission?.toFixed(2)})`,
                time: d.soldAt ? d.soldAt.toMillis() : 0,
                commission: d.commission || 0,
                title: d.title || '',
                price: d.price || 0
            };
        });
        renderActivityStats();
        renderActivityFeed();
    });

    db.collection('sellers').orderBy('createdAt', 'desc').get().then(snap => {
        allSellersData = snap.docs.map(doc => {
            const d = doc.data();
            return {
                icon: '🧑‍💼',
                text: `New seller registered: ${d.name} (${d.location || 'Unknown'})`,
                time: d.createdAt ? d.createdAt.toMillis() : 0
            };
        });
        renderActivityFeed();
    });

    db.collection('chats').orderBy('lastMessageAt', 'desc').get().then(snap => {
        allChatsData = snap.docs.map(doc => {
            const d = doc.data();
            return {
                icon: '💬',
                text: `New message about: ${d.itemTitle} from ${d.buyerName}`,
                time: d.lastMessageAt ? d.lastMessageAt.toMillis() : 0
            };
        });
        renderActivityFeed();
    });
}

function getDateBounds() {
    const fromVal = document.getElementById('laDateFrom').value;
    const toVal = document.getElementById('laDateTo').value;
    const from = fromVal ? new Date(fromVal + 'T00:00:00').getTime() : null;
    const to = toVal ? new Date(toVal + 'T23:59:59').getTime() : null;
    return { from, to };
}

function inRange(time, from, to) {
    if (from !== null && time < from) return false;
    if (to !== null && time > to) return false;
    return true;
}

function renderActivityStats() {
    const { from, to } = getDateBounds();
    const filteredSales = allSalesData.filter(s => inRange(s.time, from, to));
    const totalCommission = filteredSales.reduce((sum, s) => sum + s.commission, 0);

    document.getElementById('laStatGrid').innerHTML = `
        <div class="stat-box"><div class="num">${window.laActiveItemCount ?? '–'}</div><div class="label">Active Items</div></div>
        <div class="stat-box"><div class="num">${window.laActiveSellerCount ?? '–'}</div><div class="label">Active Sellers</div></div>
        <div class="stat-box"><div class="num">GHS ${totalCommission.toFixed(0)}</div><div class="label">Total Commission${(from || to) ? ' (filtered)' : ''}</div></div>
    `;
}

function renderActivityFeed() {
    const feed = document.getElementById('laActivityFeed');
    const { from, to } = getDateBounds();

    const showSales = document.getElementById('laShowSales').checked;
    const showSellers = document.getElementById('laShowSellers').checked;
    const showChats = document.getElementById('laShowChats').checked;

    let allActivities = [];
    if (showSales) allActivities = allActivities.concat(allSalesData);
    if (showSellers) allActivities = allActivities.concat(allSellersData);
    if (showChats) allActivities = allActivities.concat(allChatsData);

    allActivities = allActivities.filter(act => inRange(act.time, from, to));
    allActivities.sort((a, b) => b.time - a.time);

    if (allActivities.length === 0) {
        feed.innerHTML = '<p style="color:#999;">No activity in this range.</p>';
        return;
    }

    feed.innerHTML = '';
    allActivities.slice(0, 15).forEach(act => {
        const dateStr = act.time ? new Date(act.time).toLocaleString() : '';
        feed.innerHTML += `
            <div class="activity-item">
                <div class="activity-icon">${act.icon}</div>
                <div>
                    <div class="activity-text">${act.text}</div>
                    <div class="activity-time">${dateStr}</div>
                </div>
            </div>
        `;
    });
}

function applyDateFilter() {
    renderActivityStats();
    renderActivityFeed();
}

function clearDateFilter() {
    document.getElementById('laDateFrom').value = '';
    document.getElementById('laDateTo').value = '';
    renderActivityStats();
    renderActivityFeed();
}

// ---- Approvals tab logic ----

let pendingItemsData = [];
let pendingSellersData = [];
let currentApproval = null; // { type: 'item' | 'seller', id, data }

function loadApprovalsData() {
    document.getElementById('pendingItemsList').innerHTML = 'Loading...';
    document.getElementById('pendingSellersList').innerHTML = 'Loading...';

    db.collection('items').where('status', '==', 'pending').get().then(snap => {
        pendingItemsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderPendingItems();
    }).catch(err => {
        document.getElementById('pendingItemsList').innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
    });

    db.collection('sellers').where('status', '==', 'pending').get().then(snap => {
        pendingSellersData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderPendingSellers();
    }).catch(err => {
        document.getElementById('pendingSellersList').innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
    });
}

function renderPendingItems() {
    const list = document.getElementById('pendingItemsList');
    if (pendingItemsData.length === 0) {
        list.innerHTML = '<p style="color:#999; font-size:13px;">No pending items.</p>';
        return;
    }
    list.innerHTML = pendingItemsData.map(item => `
        <div class="approval-card">
            <img src="${item.image || 'https://via.placeholder.com/60?text=No+Image'}" onclick="openItemModal('${item.id}')">
            <div class="approval-card-info">
                <div class="approval-card-title">${item.title || 'Untitled'}</div>
                <div class="approval-card-sub">GHS ${item.price || 0}</div>
            </div>
            <button class="approval-view-btn" onclick="openItemModal('${item.id}')">View</button>
        </div>
    `).join('');
}

function renderPendingSellers() {
    const list = document.getElementById('pendingSellersList');
    if (pendingSellersData.length === 0) {
        list.innerHTML = '<p style="color:#999; font-size:13px;">No pending sellers.</p>';
        return;
    }
    list.innerHTML = pendingSellersData.map(seller => `
        <div class="approval-card">
            <img src="${seller.photo || 'https://via.placeholder.com/60?text=?'}" onclick="openSellerModal('${seller.id}')">
            <div class="approval-card-info">
                <div class="approval-card-title">${seller.name || 'Unnamed'}</div>
                <div class="approval-card-sub">${seller.location || 'Unknown location'}</div>
            </div>
            <button class="approval-view-btn" onclick="openSellerModal('${seller.id}')">View</button>
        </div>
    `).join('');
}

function openItemModal(id) {
    const item = pendingItemsData.find(i => i.id === id);
    if (!item) return;
    currentApproval = { type: 'item', id, data: item };

    document.getElementById('approvalModalImg').src = item.image || 'https://via.placeholder.com/480?text=No+Image';
    document.getElementById('approvalModalTitle').textContent = item.title || 'Untitled';
    document.getElementById('approvalModalDetails').innerHTML = `
        <div class="approval-detail-row"><span class="approval-detail-label">Price</span><span class="approval-detail-value">GHS ${item.price || 0}</span></div>
        <div class="approval-detail-row"><span class="approval-detail-label">Category</span><span class="approval-detail-value">${item.category || '—'}</span></div>
        <div class="approval-detail-row"><span class="approval-detail-label">Description</span><span class="approval-detail-value">${item.description || '—'}</span></div>
        <div class="approval-detail-row"><span class="approval-detail-label">Seller ID</span><span class="approval-detail-value">${item.sellerId || '—'}</span></div>
    `;
    document.getElementById('approvalModalOverlay').classList.add('open');
}

function openSellerModal(id) {
    const seller = pendingSellersData.find(s => s.id === id);
    if (!seller) return;
    currentApproval = { type: 'seller', id, data: seller };

    document.getElementById('approvalModalImg').src = seller.photo || 'https://via.placeholder.com/480?text=No+Photo';
    document.getElementById('approvalModalTitle').textContent = seller.name || 'Unnamed';
    document.getElementById('approvalModalDetails').innerHTML = `
        <div class="approval-detail-row"><span class="approval-detail-label">Location</span><span class="approval-detail-value">${seller.location || '—'}</span></div>
        <div class="approval-detail-row"><span class="approval-detail-label">Phone</span><span class="approval-detail-value">${seller.phone || '—'}</span></div>
        <div class="approval-detail-row"><span class="approval-detail-label">Email</span><span class="approval-detail-value">${seller.email || '—'}</span></div>
    `;
    document.getElementById('approvalModalOverlay').classList.add('open');
}

function closeApprovalModal() {
    document.getElementById('approvalModalOverlay').classList.remove('open');
    currentApproval = null;
}

function confirmApproval() {
    if (!currentApproval) return;
    const { type, id } = currentApproval;
    const collection = type === 'item' ? 'items' : 'sellers';

    db.collection(collection).doc(id).update({ status: 'approved' }).then(() => {
        removeFromPendingList(type, id);
        closeApprovalModal();
    }).catch(err => {
        alert('Error approving: ' + err.message);
    });
}

function confirmRejection() {
    if (!currentApproval) return;
    const { type, id } = currentApproval;
    const collection = type === 'item' ? 'items' : 'sellers';

    db.collection(collection).doc(id).update({ status: 'rejected' }).then(() => {
        removeFromPendingList(type, id);
        closeApprovalModal();
    }).catch(err => {
        alert('Error rejecting: ' + err.message);
    });
}

function removeFromPendingList(type, id) {
    if (type === 'item') {
        pendingItemsData = pendingItemsData.filter(i => i.id !== id);
        renderPendingItems();
    } else {
        pendingSellersData = pendingSellersData.filter(s => s.id !== id);
        renderPendingSellers();
    }
}

function exportSalesCSV() {    const { from, to } = getDateBounds();
    const filteredSales = allSalesData.filter(s => inRange(s.time, from, to));

    if (filteredSales.length === 0) {
        alert('No sales in the selected range to export.');
        return;
    }

    let csv = 'Date,Title,Price (GHS),Commission (GHS)\n';
    filteredSales.forEach(s => {
        const dateStr = s.time ? new Date(s.time).toLocaleDateString() : '';
        const safeTitle = `"${(s.title || '').replace(/"/g, '""')}"`;
        csv += `${dateStr},${safeTitle},${s.price},${s.commission.toFixed(2)}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
   const link = document.createElement('a');
    link.href = url;
    const fromLabel = from ? new Date(from).toISOString().slice(0,10) : 'all';
    const toLabel = to ? new Date(to).toISOString().slice(0,10) : 'all';
    link.download = `kayamart-sales_${fromLabel}_to_${toLabel}.csv`;
    link.click();
    URL.revokeObjectURL(url);
}

function loadOwnerSellerPicker(content) {
    db.collection('sellers').where('status', '==', 'approved').get().then((snapshot) => {
        if (snapshot.empty) {
            content.innerHTML = '<p style="text-align:center; color:#999;">No approved sellers yet.</p>';
            return;
        }
        let html = '<h3>Select a seller to view their analytics:</h3><div style="display:flex; flex-direction:column; gap:8px;">';
        snapshot.forEach(doc => {
            const s = doc.data();
            html += `
                <button onclick="viewSellerAnalytics('${doc.id}')" style="display:flex; align-items:center; gap:10px; padding:10px; border:1px solid #ddd; border-radius:8px; background:white; cursor:pointer; text-align:left;">
                    <img src="${s.photo || 'https://via.placeholder.com/40?text=?'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <span>${s.name}</span>
                </button>
            `;
        });
        html += '</div>';
        content.innerHTML = html;
    });
}

function viewSellerAnalytics(id) {
    const content = document.getElementById('analyticsContent');
    content.innerHTML = '<p style="text-align:center; color:#999;">Loading...</p>';
    loadSellerAnalytics(id, content);
}

 function loadSellerAnalytics(id, content) {
    const header = document.getElementById('dashboardHeader');
    if (header) header.style.display = 'none';
    content.innerHTML = '<p style="text-align:center; color:#999;">Loading...</p>';

    db.collection('sellers').doc(id).get().then((sellerDoc) => {
        const sellerInfo = sellerDoc.exists ? sellerDoc.data() : null;

        db.collection('sales').where('sellerId', '==', id).get().then((salesSnapshot) => {
            const sales = [];
            salesSnapshot.forEach(doc => sales.push(doc.data()));
            sales.sort((a, b) => {
                const aTime = a.soldAt ? a.soldAt.toMillis() : 0;
                const bTime = b.soldAt ? b.soldAt.toMillis() : 0;
                return bTime - aTime;
            });

            db.collection('items').where('sellerId', '==', id).get().then((itemsSnapshot) => {
                const postedItems = [];
                itemsSnapshot.forEach(doc => postedItems.push({ id: doc.id, ...doc.data() }));
                renderSellerAnalytics(sales, content, sellerInfo, postedItems);
            }).catch((err) => {
                content.innerHTML = '<p style="color:red; text-align:center;">Error: ' + err.message + '</p>';
            });
        }).catch((err) => {
            content.innerHTML = '<p style="color:red; text-align:center;">Error: ' + err.message + '</p>';
        });
    });
}

function renderSellerAnalytics(sales, content, sellerInfo, postedItems) {
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startOfWeek = new Date(startOfDay);
    startOfWeek.setDate(startOfDay.getDate() - startOfDay.getDay());
    const startOfYear = new Date(now.getFullYear(), 0, 1);

    let daily = 0, weekly = 0, yearly = 0, allTime = 0;
    let dailyCommission = 0, weeklyCommission = 0, yearlyCommission = 0, allTimeCommission = 0;

    sales.forEach(sale => {
        const soldDate = sale.soldAt ? sale.soldAt.toDate() : new Date();
        allTime += sale.price;
        allTimeCommission += sale.commission;

        if (soldDate >= startOfYear) {
            yearly += sale.price;
            yearlyCommission += sale.commission;
        }
        if (soldDate >= startOfWeek) {
            weekly += sale.price;
            weeklyCommission += sale.commission;
        }
        if (soldDate >= startOfDay) {
            daily += sale.price;
            dailyCommission += sale.commission;
        }
    });
let headerHtml = '';
    if (isOwner) {
        headerHtml += `<button onclick="loadOwnerDashboard(document.getElementById('analyticsContent'))" style="width:auto; background:#eee; color:#333; border:none; border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; margin-bottom:15px;">← Back to Business Overview</button>`;
    }
    if (sellerInfo) {
        headerHtml += `
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid #eee;">
                <img src="${sellerInfo.photo || 'https://via.placeholder.com/60?text=?'}" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                <h2 style="margin:0; text-align:left;">${sellerInfo.name}</h2>
            </div>
        `;
    }
   const maxVal = Math.max(daily, weekly, yearly, allTime, 1);
const dailyH = (daily / maxVal) * 100;
const weeklyH = (weekly / maxVal) * 100;
const yearlyH = (yearly / maxVal) * 100;
const allTimeH = (allTime / maxVal) * 100;

let html = headerHtml + `
    <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin:20px 0;">        <div style="background:#f8f8f8; border-radius:10px; padding:15px; text-align:center;">
            <div style="font-size:12px; color:#777;">Today</div>
            <div style="font-size:18px; font-weight:bold;">GHS ${daily.toFixed(2)}</div>
        </div>
        <div style="background:#f8f8f8; border-radius:10px; padding:15px; text-align:center;">
            <div style="font-size:12px; color:#777;">This Week</div>
            <div style="font-size:18px; font-weight:bold;">GHS ${weekly.toFixed(2)}</div>
        </div>
        <div style="background:#f8f8f8; border-radius:10px; padding:15px; text-align:center;">
            <div style="font-size:12px; color:#777;">This Year</div>
            <div style="font-size:18px; font-weight:bold;">GHS ${yearly.toFixed(2)}</div>
        </div>
        <div style="background:#1a5c3a; color:white; border-radius:10px; padding:15px; text-align:center;">
            <div style="font-size:12px;">All Time</div>
            <div style="font-size:18px; font-weight:bold;">GHS ${allTime.toFixed(2)}</div>
        </div>
    </div>

    <h3>Income Overview</h3>
    <div style="display:flex; align-items:flex-end; justify-content:space-around; height:150px; background:#fafafa; border-radius:10px; padding:15px 10px; margin-bottom:20px;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
            <div style="width:35px; height:${dailyH}px; background:#1a5c3a; border-radius:4px 4px 0 0; min-height:2px;"></div>
            <span style="font-size:11px; color:#777;">Day</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
            <div style="width:35px; height:${weeklyH}px; background:#1a5c3a; border-radius:4px 4px 0 0; min-height:2px;"></div>
            <span style="font-size:11px; color:#777;">Week</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
            <div style="width:35px; height:${yearlyH}px; background:#1a5c3a; border-radius:4px 4px 0 0; min-height:2px;"></div>
            <span style="font-size:11px; color:#777;">Year</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5px;">
            <div style="width:35px; height:${allTimeH}px; background:#e67e22; border-radius:4px 4px 0 0; min-height:2px;"></div>
            <span style="font-size:11px; color:#777;">All Time</span>
        </div>
    </div>

    <h3>Sold Items</h3>
    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px;">
`;
if (sales.length === 0) {
        html += '<p style="color:#999; grid-column:1/-1; text-align:center;">No items sold yet.</p>';
    } else {
        sales.forEach(sale => {
            html += `
                <div style="text-align:center;">
                    <img src="${sale.image || 'https://via.placeholder.com/100?text=No+Image'}" style="width:100%; height:90px; object-fit:cover; border-radius:8px;">
                    <div style="font-size:12px; margin-top:4px;">${sale.title}</div>
                    <div style="font-size:12px; color:#1a5c3a; font-weight:bold;">GHS ${sale.price}</div>
                </div>
            `;
        });
    }

    html += '</div>';

    html += '<h3 style="margin-top:25px;">Posted Items</h3>';
    html += '<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:10px;">';

    const items = postedItems || [];
    if (items.length === 0) {
        html += '<p style="color:#999; grid-column:1/-1; text-align:center;">No items posted yet.</p>';
    } else {
        items.forEach(item => {
            const statusColor = item.status === 'approved' ? '#1a5c3a' : (item.status === 'pending' ? '#e67e22' : '#c0392b');
            const statusLabel = item.status || 'unknown';
            html += `
                <div style="text-align:center;">
                    <div style="position:relative;">
                        <img src="${item.image || 'https://via.placeholder.com/100?text=No+Image'}" style="width:100%; height:90px; object-fit:cover; border-radius:8px;">
                        <span style="position:absolute; top:4px; right:4px; background:${statusColor}; color:white; font-size:9px; font-weight:600; padding:2px 6px; border-radius:6px; text-transform:capitalize;">${statusLabel}</span>
                    </div>
                    <div style="font-size:12px; margin-top:4px;">${item.title || 'Untitled'}</div>
                    <div style="font-size:12px; color:#1a5c3a; font-weight:bold;">GHS ${item.price || 0}</div>
                </div>
            `;
        });
    }

    html += '</div>';
    content.innerHTML = html;
}  loadAnalytics();
