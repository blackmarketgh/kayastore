function loadOwnerDashboard(content) {
    const header = document.getElementById('dashboardHeader');
    if (header) header.style.display = '';
    content.innerHTML = '<p style="text-align:center; color:#999;">Loading...</p>';

    db.collection('sales').get().then((snapshot) => {
        const sales = [];
        snapshot.forEach(doc => sales.push(doc.data()));
        renderOwnerDashboard(sales, content);
    }).catch((err) => {
        content.innerHTML = '<p style="color:red; text-align:center;">Error: ' + err.message + '</p>';
    });
}

function getDateBounds() {
    const fromVal = document.getElementById('laDateFrom').value;
    const toVal = document.getElementById('laDateTo').value;
    const from = fromVal ? new Date(fromVal + 'T00:00:00').getTime() : null;
    const to = toVal ? new Date(toVal + 'T23:59:59').getTime() : null;
    return { from, to };
}

function inRange(time, from, to) {
    if (from !== null && time < from) return false;
    if (to !== null && time > to) return false;
    return true;
}

function renderActivityStats() {
    const { from, to } = getDateBounds();
    const filteredSales = allSalesData.filter(s => inRange(s.time, from, to));
    const totalCommission = filteredSales.reduce((sum, s) => sum + s.commission, 0);

    document.getElementById('laStatGrid').innerHTML = `
        <div class="stat-box"><div class="num">${window.laActiveItemCount ?? '–'}</div><div class="label">Active Items</div></div>
        <div class="stat-box"><div class="num">${window.laActiveSellerCount ?? '–'}</div><div class="label">Active Sellers</div></div>
        <div class="stat-box"><div class="num">GHS ${totalCommission.toFixed(0)}</div><div class="label">Total Commission${(from || to) ? ' (filtered)' : ''}</div></div>
    `;
}

function renderActivityFeed() {
    const feed = document.getElementById('laActivityFeed');
    const { from, to } = getDateBounds();

    const showSales = document.getElementById('laShowSales').checked;
    const showSellers = document.getElementById('laShowSellers').checked;
    const showChats = document.getElementById('laShowChats').checked;

    let allActivities = [];
    if (showSales) allActivities = allActivities.concat(allSalesData);
    if (showSellers) allActivities = allActivities.concat(allSellersData);
    if (showChats) allActivities = allActivities.concat(allChatsData);

    allActivities = allActivities.filter(act => inRange(act.time, from, to));
    allActivities.sort((a, b) => b.time - a.time);

    if (allActivities.length === 0) {
        feed.innerHTML = '<p style="color:#999;">No activity in this range.</p>';
        return;
    }

    feed.innerHTML = '';
    allActivities.slice(0, 15).forEach(act => {
        const dateStr = act.time ? new Date(act.time).toLocaleString() : '';
        feed.innerHTML += `
            <div class="activity-item">
                <div class="activity-icon">${act.icon}</div>
                <div>
                    <div class="activity-text">${act.text}</div>
                    <div class="activity-time">${dateStr}</div>
                </div>
            </div>
        `;
    });
}

// ---- Users Per Day tab logic ----

function dayKey(dateObj) {
    return dateObj.toISOString().slice(0, 10);
}

function last14DayKeys() {
    const keys = [];
    for (let i = 13; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        keys.push(dayKey(d));
    }
    return keys;
}

function loadUsersData() {
    const container = document.getElementById('usersDailyList');
    container.innerHTML = 'Loading...';

    const days = last14DayKeys();
    const buyerCounts = {};
    const sellerCounts = {};
    const visitorCounts = {};
    days.forEach(d => { buyerCounts[d] = 0; sellerCounts[d] = 0; visitorCounts[d] = 0; });

    const earliestDate = new Date();
    earliestDate.setDate(earliestDate.getDate() - 13);
    earliestDate.setHours(0, 0, 0, 0);

    Promise.all([
        db.collection('buyers').where('createdAt', '>=', earliestDate).get(),
        db.collection('sellers').where('createdAt', '>=', earliestDate).get(),
        db.collection('visits').where('date', '>=', days[0]).get()
    ]).then(([buyersSnap, sellersSnap, visitsSnap]) => {
        buyersSnap.forEach(doc => {
            const d = doc.data();
            if (!d.createdAt) return;
            const key = dayKey(d.createdAt.toDate());
            if (key in buyerCounts) buyerCounts[key]++;
        });

        sellersSnap.forEach(doc => {
            const d = doc.data();
            if (!d.createdAt) return;
            const key = dayKey(d.createdAt.toDate());
            if (key in sellerCounts) sellerCounts[key]++;
        });

        visitsSnap.forEach(doc => {
            const d = doc.data();
            if (d.date in visitorCounts) visitorCounts[d.date]++;
        });

        renderUsersDaily(days, buyerCounts, sellerCounts, visitorCounts);
    }).catch(err => {
        container.innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
    });
}

function renderUsersDaily(days, buyerCounts, sellerCounts, visitorCounts) {
    const container = document.getElementById('usersDailyList');

    container.innerHTML = days.slice().reverse().map(day => {
        const totalSignups = buyerCounts[day] + sellerCounts[day];
        return `
        <div class="approval-card" style="align-items:center;">
            <div class="approval-card-info">
                <div class="approval-card-title">${day}</div>
                <div class="approval-card-sub">🧑 ${buyerCounts[day]} new buyer${buyerCounts[day] === 1 ? '' : 's'} • 🧑‍💼 ${sellerCounts[day]} new seller${sellerCounts[day] === 1 ? '' : 's'} (${totalSignups} sign-up${totalSignups === 1 ? '' : 's'} total)</div>
                <div class="approval-card-sub">👁️ ${visitorCounts[day]} unique visitor${visitorCounts[day] === 1 ? '' : 's'}</div>
            </div>
        </div>
        `;
    }).join('');
}

 function loadSellerAnalytics(id, content) {
    const header = document.getElementById('dashboardHeader');
    if (header) header.style.display = 'none';
    content.innerHTML = '<p style="text-align:center; color:#999;">Loading...</p>';

    db.collection('sellers').doc(id).get().then((sellerDoc) => {
        const sellerInfo = sellerDoc.exists ? sellerDoc.data() : null;

        db.collection('sales').where('sellerId', '==', id).get().then((salesSnapshot) => {
            const sales = [];
            salesSnapshot.forEach(doc => sales.push(doc.data()));
            sales.sort((a, b) => {
                const aTime = a.soldAt ? a.soldAt.toMillis() : 0;
                const bTime = b.soldAt ? b.soldAt.toMillis() : 0;
                return bTime - aTime;
            });

            db.collection('items').where('sellerId', '==', id).get().then((itemsSnapshot) => {
                const postedItems = [];
                itemsSnapshot.forEach(doc => postedItems.push({ id: doc.id, ...doc.data() }));
                renderSellerAnalytics(sales, content, sellerInfo, postedItems);
            }).catch((err) => {
                content.innerHTML = '<p style="color:red; text-align:center;">Error: ' + err.message + '</p>';
            });
        }).catch((err) => {
            content.innerHTML = '<p style="color:red; text-align:center;">Error: ' + err.message + '</p>';
        });
    });
}

function renderSellerAnalytics(sales, content, sellerInfo, postedItems) {
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startOfWeek = new Date(startOfDay);
    startOfWeek.setDate(startOfDay.getDate() - startOfDay.getDay());
    const startOfYear = new Date(now.getFullYear(), 0, 1);

    let daily = 0, weekly = 0, yearly = 0, allTime = 0;
    let dailyCommission = 0, weeklyCommission = 0, yearlyCommission = 0, allTimeCommission = 0;

// ================= ORDERS ===================

let allOrdersData = [];

function loadOrdersData() {
    const listDiv = document.getElementById('ordersList');
    listDiv.innerHTML = 'Loading...';

    db.collection('orders').orderBy('createdAt', 'desc').get().then((snapshot) => {
        allOrdersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderOrders();
    }).catch((err) => {
        listDiv.innerHTML = '<p style="color:red;">Error loading orders: ' + err.message + '</p>';
    });
}

function renderOrders() {
    const listDiv = document.getElementById('ordersList');

    if (allOrdersData.length === 0) {
        listDiv.innerHTML = '<p style="color:#999;">No orders yet.</p>';
        return;
    }

    listDiv.innerHTML = allOrdersData.map(order => {
        const dateStr = order.createdAt ? order.createdAt.toDate().toLocaleString() : 'Unknown date';
        const statusColor = order.status === 'handled' ? '#27ae60' : '#e67e22';

        const itemsHtml = (order.items || []).map(it => {
            let extras = '';
            if (it.color) extras += ' • Color: ' + it.color;
            if (it.size) extras += ' • Size: ' + it.size;
            return `
                <div style="padding:6px 0; border-bottom:1px dashed #eee; font-size:13px;">
                    <div>${it.title} x${it.qty} (GHS ${it.price * it.qty})${extras}</div>
                    <div style="color:#777; font-size:12px;">Seller: ${it.sellerName || 'Unknown'} — 📞 ${it.sellerPhone || 'N/A'}</div>
                </div>
            `;
        }).join('');

        return `
            <div style="padding:14px 0; border-bottom:2px solid #ddd;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>${order.buyerName || 'Unknown Buyer'}</strong>
                    <span style="color:${statusColor}; font-weight:bold; text-transform:capitalize;">${order.status || 'pending'}</span>
                </div>
                <div style="font-size:13px; color:#777; margin:4px 0;">📞 ${order.buyerPhone || 'N/A'} • ${order.deliveryMethod || ''} to ${order.location || ''}</div>
                ${order.address ? `<div style="font-size:12px; color:#999; margin-bottom:6px;">Address: ${order.address}</div>` : ''}
                <div style="margin:8px 0;">${itemsHtml}</div>
                <div style="font-weight:bold; text-align:right;">Total: GHS ${order.total}</div>
                <div style="font-size:11px; color:#999; margin-top:4px;">${dateStr}</div>
                ${order.status !== 'handled' ? `<button onclick="markOrderHandled('${order.id}')" style="width:auto; background:#27ae60; color:white; border:none; border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; margin-top:8px;">✅ Mark as Handled</button>` : ''}
            </div>
        `;
    }).join('');
}

function markOrderHandled(id) {
    db.collection('orders').doc(id).update({ status: 'handled' }).then(() => {
        loadOrdersData();
    }).catch((err) => {
        alert("Failed to update order: " + err.message);
    });
}
// ================= CLOSED DEALS ===================

function loadClosedDealsData() {
    const summaryDiv = document.getElementById('closedDealsSummary');
    const listDiv = document.getElementById('closedDealsBySeller');
    listDiv.innerHTML = 'Loading...';

    db.collection('sales').orderBy('soldAt', 'desc').get().then((snapshot) => {
        if (snapshot.empty) {
            listDiv.innerHTML = '<p style="color:#999;">No closed deals yet.</p>';
            summaryDiv.innerText = '';
            return;
        }

        const bySeller = {};
        let totalOutstanding = 0;
        let totalCollected = 0;

        snapshot.forEach((doc) => {
            const sale = doc.data();
            sale.id = doc.id;
            const sid = sale.sellerId || 'unknown';
            if (!bySeller[sid]) bySeller[sid] = [];
            bySeller[sid].push(sale);

            if (sale.collected) {
                totalCollected += Number(sale.commission) || 0;
            } else {
                totalOutstanding += Number(sale.commission) || 0;
            }
        });

        summaryDiv.innerText = `Outstanding: GHS ${totalOutstanding.toFixed(2)} • Already Collected: GHS ${totalCollected.toFixed(2)}`;

        const sellerIds = Object.keys(bySeller);
        const sellerNamePromises = sellerIds.map(sid =>
            sid === 'OWNER' || sid === 'unknown'
                ? Promise.resolve({ id: sid, name: sid === 'OWNER' ? 'KayaMart (You)' : 'Unknown Seller' })
                : db.collection('sellers').doc(sid).get().then(d => ({ id: sid, name: d.exists ? d.data().name : 'Unknown Seller' }))
        );

        Promise.all(sellerNamePromises).then((sellerInfos) => {
            const nameMap = {};
            sellerInfos.forEach(info => { nameMap[info.id] = info.name; });

            let html = '';
            sellerIds.forEach(sid => {
                const sales = bySeller[sid];
                const outstandingForSeller = sales.filter(s => !s.collected).reduce((sum, s) => sum + (Number(s.commission) || 0), 0);
                const uncollectedIds = sales.filter(s => !s.collected).map(s => s.id);

                html += `
                    <div style="padding:12px 0; border-bottom:2px solid #ddd;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>${nameMap[sid] || 'Unknown Seller'}</strong>
                            <span style="color:${outstandingForSeller > 0 ? '#e74c3c' : '#27ae60'}; font-weight:bold;">
                                ${outstandingForSeller > 0 ? 'Owes GHS ' + outstandingForSeller.toFixed(2) : 'Settled ✓'}
                            </span>
                        </div>
                        ${outstandingForSeller > 0 ? `<button onclick='collectCommission("${sid}", ${JSON.stringify(uncollectedIds)})' style="width:auto; background:#27ae60; color:white; border:none; border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; margin-top:6px;">💰 Mark as Collected</button>` : ''}
                        <div style="margin-top:8px;">
                            ${sales.map(sale => {
                                const dateStr = sale.soldAt ? sale.soldAt.toDate().toLocaleDateString() : 'Unknown date';
                                return `
                                    <div style="padding:6px 0; font-size:13px; display:flex; justify-content:space-between; color:${sale.collected ? '#999' : '#333'};">
                                        <span>${sale.title} (GHS ${sale.price})</span>
                                        <span>${sale.collected ? '✓ Collected' : 'GHS ' + Number(sale.commission).toFixed(2)} • ${dateStr}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });

            listDiv.innerHTML = html;
        });
    }).catch((err) => {
        listDiv.innerHTML = '<p style="color:red;">Error loading closed deals: ' + err.message + '</p>';
    });
}

function collectCommission(sellerId, saleIds) {
    if (!confirm("Mark all outstanding commission for this seller as collected?")) return;

    const promises = saleIds.map(id =>
        db.collection('sales').doc(id).update({ collected: true })
    );

    Promise.all(promises).then(() => {
        alert("Commission marked as collected.");
        loadClosedDealsData();
    }).catch((err) => {
        alert("Failed to update: " + err.message);
    });
}

.update({

function suspendSeller(id){

function deleteSeller(id){

db.collection("items")
.where("sellerId","==",id)
.get()
.then(snapshot=>{

snapshot.forEach(doc=>{

batch.delete(doc.ref);

});

batch.delete(db.collection("sellers").doc(id));

return batch.commit();

})
.then(()=>{

})
.catch((err)=>{
